{% extends "dashboard.html" %}

{% block content %}
<div class="card shadow-sm border-0 mt-3">
    <div class="card-header bg-white">
        <h5 class="mb-0 fw-bold"><i class="fas fa-boxes text-primary me-2"></i>Product Inventory Levels</h5>
    </div>
    <div class="card-body">
        {% if labels %}
        <div style="height: 400px;">
            <canvas id="productsChart"></canvas>
        </div>
        {% else %}
        <div class="text-center py-5">
            <i class="fas fa-exclamation-circle fa-3x text-light mb-3"></i>
            <p class="text-muted">No products found in your database.</p>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const ctx = document.getElementById('productsChart');
    if (ctx) {
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: {{ labels | tojson }},
                datasets: [{
                    label: 'Quantity in Stock',
                    data: {{ values | tojson }},
                    backgroundColor: 'rgba(13, 110, 253, 0.8)',
                    borderRadius: 5
                }]
            },
            options: {
                indexAxis: 'y', 
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    x: { 
                        beginAtZero: true,
                        title: { display: true, text: 'Items Remaining' }
                    },
                    y: {
                        ticks: { autoSkip: false }
                    }
                }
            }
        });
    }
</script>
{% endblock %}
